<div id="team-select-modal" class="fixed inset-0 bg-gray-900 bg-opacity-75 flex items-center justify-center hidden z-50 p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-6xl h-[85vh] flex flex-col relative">
        <div class="p-6 border-b border-gray-200 flex justify-between items-center">
            <h2 id="team-select-modal-title" class="text-xl font-bold text-gray-900">팀원 선택</h2>
            <button class="modal-close-btn">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
        </div>
        <div id="team-select-modal-content" class="flex-grow p-6 overflow-x-auto flex space-x-4"></div>
        <div class="p-4 bg-gray-50 rounded-b-2xl flex justify-end gap-4">
            <button type="button" id="cancel-team-select-btn" class="bg-white hover:bg-gray-100 border border-gray-300 text-gray-800 font-bold py-2 px-4 rounded-lg transition">취소</button>
            <button type="button" id="confirm-team-select-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition">선택 완료 및 업무 시작</button>
        </div>
    </div>
</div>

<div id="edit-part-timer-modal" class="fixed inset-0 bg-gray-900 bg-opacity-75 flex items-center justify-center hidden z-50 p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm relative">
        <div class="p-6 border-b border-gray-200 flex justify-between items-center">
            <h2 class="text-xl font-bold text-gray-900">알바 이름 수정</h2>
            <button class="modal-close-btn">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
        </div>
        <div class="p-6 space-y-4">
            <div>
                <label for="part-timer-new-name" class="block text-sm font-medium text-gray-700">새 이름</label>
                <input type="text" id="part-timer-new-name" class="mt-1 w-full bg-white border border-gray-300 rounded-lg p-2">
                <input type="hidden" id="part-timer-edit-id">
            </div>
        </div>
        <div class="p-4 bg-gray-50 rounded-b-2xl flex justify-end gap-4">
            <button type="button" id="cancel-edit-part-timer-btn" class="bg-white hover:bg-gray-100 border border-gray-300 text-gray-800 font-bold py-2 px-4 rounded-lg transition">취소</button>
            <button type="button" id="confirm-edit-part-timer-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition">저장</button>
        </div>
    </div>
</div>
