<div id="cost-simulation-modal" class="fixed inset-0 bg-gray-900 bg-opacity-75 flex items-center justify-center hidden z-[100] p-4 transition-opacity">
    <div id="sim-modal-content-box" class="bg-white rounded-2xl shadow-2xl w-full max-w-4xl relative max-h-[95vh] flex flex-col overflow-hidden">
        
        <div id="sim-modal-header" class="p-5 md:p-6 border-b border-gray-100 bg-white z-10 cursor-move flex justify-between items-center shrink-0">
            <h2 class="text-lg md:text-xl font-extrabold text-gray-900 flex items-center gap-2">
                <span class="text-2xl">📊</span> 업무 예측 시뮬레이션
            </h2>
            <button class="modal-close-btn w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 text-gray-500 hover:text-gray-800 transition" data-modal-id="cost-simulation-modal">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        
        <div class="p-5 md:p-6 overflow-y-auto custom-scrollbar flex-1 space-y-6">
            
            <div id="sim-common-settings" class="bg-indigo-50/50 p-4 rounded-xl border border-indigo-100 flex flex-col md:flex-row md:items-center justify-between gap-4 shadow-sm">
                <div class="flex items-center gap-3">
                    <label for="sim-start-time-input" class="text-sm font-bold text-indigo-900">🕒 시작 시각 (전체):</label>
                    <input type="time" id="sim-start-time-input" class="p-2 border border-indigo-200 rounded-lg text-sm font-bold text-indigo-700 bg-white shadow-inner focus:ring-2 focus:ring-indigo-500 outline-none" value="08:30">
                </div>
                <div id="sim-end-time-wrapper" class="flex items-center gap-3">
                    <label for="sim-end-time-input" class="text-sm font-bold text-indigo-900">🏁 목표 종료(퇴근) 시각:</label>
                    <input type="time" id="sim-end-time-input" class="p-2 border border-indigo-200 rounded-lg text-sm font-bold text-indigo-700 bg-white shadow-inner focus:ring-2 focus:ring-indigo-500 outline-none" value="17:30">
                </div>
            </div>

            <div id="sim-input-area" class="flex flex-col gap-3">
                 <div class="flex justify-between items-end">
                    <div>
                        <h4 class="text-sm font-extrabold text-gray-800">📋 시뮬레이션 대상 업무</h4>
                        <p class="text-[11px] text-gray-500 mt-1">인원을 비워두면 남은 인원이 유동적으로 배분됩니다.</p>
                    </div>
                    <button id="sim-add-task-row-btn" class="text-xs bg-blue-50 border border-blue-200 hover:bg-blue-100 text-blue-700 font-bold px-3 py-2 rounded-lg transition shadow-sm flex items-center gap-1">
                        <span>+</span> 업무 열 추가
                    </button>
                </div>
                
                <div class="overflow-x-auto border border-gray-200 rounded-xl shadow-sm">
                    <table class="w-full text-sm text-left text-gray-600 whitespace-nowrap">
                        <thead class="text-[11px] text-gray-500 uppercase bg-gray-50 tracking-wider">
                            <tr>
                                <th class="px-2 py-3 w-10 text-center border-b border-gray-200">≡</th>
                                <th class="px-2 py-3 w-14 text-center border-b border-gray-200" title="이전 업무와 동시에 진행합니다.">동시진행</th>
                                <th class="px-3 py-3 border-b border-gray-200">업무 선택</th>
                                <th class="px-3 py-3 w-[110px] text-center border-b border-gray-200">시작 시각</th>
                                <th class="px-3 py-3 w-[90px] text-right border-b border-gray-200">표준 속도</th> 
                                <th class="px-3 py-3 w-[100px] text-right border-b border-gray-200">목표 수량</th>
                                <th class="px-3 py-3 w-[100px] text-right border-b border-gray-200 text-indigo-600 font-bold">투입 인원</th>
                                <th class="px-2 py-3 text-center w-12 border-b border-gray-200">삭제</th>
                            </tr>
                        </thead>
                        <tbody id="sim-task-table-body" class="divide-y divide-gray-100 bg-white">
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="flex items-center justify-end px-1">
                <label class="flex items-center gap-2 cursor-pointer group">
                    <input type="checkbox" id="sim-include-linked-tasks-checkbox" class="h-4 w-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500" checked>
                    <span class="text-xs text-gray-600 font-medium group-hover:text-indigo-600 transition select-none">'사전 작업' 등 연관 업무 시간 포함하기</span>
                </label>
            </div>
            
            <button id="sim-calculate-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold py-4 px-6 rounded-xl transition shadow-lg active:scale-[0.99] text-lg flex justify-center items-center gap-2">
                <span>결과 예측하기</span> 🚀
            </button>

            <div id="sim-result-container" class="hidden space-y-8 pt-8 border-t border-gray-200 mt-4">
                
                <div id="sim-summary-grid" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    </div>

                <div class="flex flex-col gap-3">
                    <h4 class="text-sm font-extrabold text-gray-800 flex items-center gap-2">
                        <span>📑</span> 개별 업무 예측 상세
                    </h4>
                    <div class="overflow-x-auto border border-gray-200 rounded-xl shadow-sm">
                        <table class="w-full text-sm text-left text-gray-600 whitespace-nowrap">
                            <thead id="sim-result-thead" class="bg-gray-50 text-[11px] uppercase text-gray-500 tracking-wider">
                                </thead>
                            <tbody id="sim-result-tbody" class="divide-y divide-gray-100 bg-white"></tbody>
                        </table>
                    </div>
                </div>
            </div>
            
            <div id="sim-bottleneck-container" class="hidden pb-4"></div>
        </div>
    </div>
</div>
