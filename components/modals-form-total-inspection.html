<div id="total-inspection-manager-modal" class="fixed inset-0 bg-gray-900 bg-opacity-75 flex items-center justify-center hidden z-[65] p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-3xl relative flex flex-col max-h-[95vh]">
        <div class="p-5 border-b border-gray-200 bg-purple-50 flex justify-between items-center flex-shrink-0 rounded-t-2xl">
            <div>
                <h2 class="text-xl font-bold text-purple-900 flex items-center gap-2">
                    📦 전량 검수 매니저
                </h2>
                <p class="text-xs text-purple-600 mt-1">불량 이슈 등으로 인한 전체 재고 검수 현황을 관리합니다.</p>
            </div>
            <button class="modal-close-btn text-purple-400 hover:text-purple-700 transition" onclick="document.getElementById('total-inspection-manager-modal').classList.add('hidden')">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
        </div>

        <div class="p-6 space-y-6 overflow-y-auto flex-grow">
            <div class="flex gap-2 items-end">
                <div class="flex-grow">
                    <label for="total-insp-product-name" class="block text-sm font-bold text-gray-700 mb-1">상품명 검색 (조회/생성)</label>
                    <input type="text" id="total-insp-product-name" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none font-medium" placeholder="검수할 상품명 입력">
                </div>
                <button id="total-insp-search-btn" class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-6 rounded-lg shadow-sm transition h-[46px]">
                    데이터 조회
                </button>
            </div>

            <div id="total-insp-content-area" class="hidden space-y-6 mt-4">
                <div class="bg-indigo-50 p-4 rounded-lg border border-indigo-100">
                    <h4 class="text-xs font-bold text-indigo-800 mb-2 border-b border-indigo-200 pb-1">🏷️ 상품 상세 정보</h4>
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                        <div>
                            <label class="block text-[10px] text-indigo-500 font-bold uppercase">코드</label>
                            <div id="total-insp-code" class="text-sm font-bold text-indigo-900 bg-white p-1.5 rounded border border-indigo-100 min-h-[30px]">-</div>
                        </div>
                        <div>
                            <label class="block text-[10px] text-indigo-500 font-bold uppercase">옵션</label>
                            <div id="total-insp-option" class="text-sm font-bold text-indigo-900 bg-white p-1.5 rounded border border-indigo-100 min-h-[30px]">-</div>
                        </div>
                        <div>
                            <label class="block text-[10px] text-indigo-500 font-bold uppercase">공급처상품명</label>
                            <div id="total-insp-supplier" class="text-sm font-bold text-indigo-900 bg-white p-1.5 rounded border border-indigo-100 min-h-[30px]">-</div>
                        </div>
                        <div>
                            <label for="total-insp-inbound-date" class="block text-[10px] text-indigo-500 font-bold uppercase">입고일자</label>
                            <input type="date" id="total-insp-inbound-date" class="w-full p-1.5 border border-indigo-200 rounded text-sm bg-white font-medium text-indigo-900">
                        </div>
                        <div class="md:col-span-2">
                            <label for="total-insp-location" class="block text-[10px] text-indigo-500 font-bold uppercase">로케이션</label>
                            <input type="text" id="total-insp-location" class="w-full p-1.5 border border-indigo-200 rounded text-sm bg-white font-medium text-indigo-900" placeholder="로케이션 위치 입력 (예: A-1-03)">
                        </div>
                    </div>
                </div>

                <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
                    <div class="mb-3">
                        <label for="total-insp-reason" class="block text-xs font-bold text-gray-600 mb-1">검수 사유 / 문제 내용</label>
                        <input type="text" id="total-insp-reason" class="w-full p-2 border border-gray-300 rounded text-sm bg-white" placeholder="예: 지퍼 불량 접수건으로 인한 전량 검수">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label for="total-insp-total-stock" class="block text-xs font-bold text-gray-600 mb-1">총 재고 (검수 대상 수량)</label>
                            <input type="number" id="total-insp-total-stock" class="w-full p-2 border border-gray-300 rounded text-sm bg-white font-bold text-blue-600" placeholder="0">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-600 mb-1">현재까지 검수 완료 누적 수량</label>
                            <div id="total-insp-accumulated" class="w-full p-2 border border-gray-200 rounded text-sm bg-gray-100 font-bold text-gray-700">0</div>
                        </div>
                    </div>
                </div>

                <h4 class="text-sm font-bold text-gray-800 border-b pb-2">✏️ 금일 검수 결과 입력</h4>
                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <label for="total-insp-today-normal" class="block text-xs font-bold text-green-600 mb-1">금일 정상 수량</label>
                        <input type="number" id="total-insp-today-normal" class="w-full p-3 border border-green-300 rounded-lg text-lg text-center font-bold" placeholder="0">
                    </div>
                    <div>
                        <label for="total-insp-today-defective" class="block text-xs font-bold text-red-600 mb-1">금일 불량 수량</label>
                        <input type="number" id="total-insp-today-defective" class="w-full p-3 border border-red-300 rounded-lg text-lg text-center font-bold" placeholder="0">
                    </div>
                    <div class="bg-purple-50 p-3 rounded-lg border border-purple-200 text-center flex flex-col justify-center">
                        <span class="text-xs font-bold text-purple-800 mb-1">앞으로 남은 수량</span>
                        <span id="total-insp-remaining" class="text-2xl font-black text-purple-600">-</span>
                    </div>
                </div>

                <button id="total-insp-save-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-md transition text-lg mt-4">
                    검수 내역 누적 저장
                </button>
            </div>
        </div>
        
        <div class="p-4 bg-gray-50 border-t border-gray-200 flex justify-end rounded-b-2xl gap-3">
            <button type="button" id="total-insp-back-btn" class="mr-auto bg-indigo-50 hover:bg-indigo-100 border border-indigo-200 text-indigo-700 font-bold py-2 px-4 rounded-lg transition flex items-center gap-2">
                샘플검수로 돌아가기
            </button>
            <button class="bg-white hover:bg-gray-100 border border-gray-300 text-gray-800 font-bold py-2 px-6 rounded-lg transition" onclick="document.getElementById('total-inspection-manager-modal').classList.add('hidden')">닫기</button>
        </div>
    </div>
</div>
