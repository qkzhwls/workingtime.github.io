                        <div id="status-remaining-days" class="text-2xl font-extrabold text-blue-700">-</div>

                    </div>
                    <ul id="status-history-list" class="space-y-2 max-h-[35vh] overflow-y-auto pr-2 custom-scrollbar"></ul>
                </div>
            </div>

            <div id="panel-leave-setting" class="space-y-6">

                    <label class="block text-sm font-bold text-gray-700 mb-2">어떤 일정을 등록하시나요?</label>

                    <div class="flex gap-4">
                        <div class="flex-1">
                            <label for="leave-start-date-input" class="block text-xs font-bold text-gray-500 mb-1">시작일</label>

                            <input type="time" id="leave-start-time-input" class="w-full bg-gray-50 border border-gray-200 text-gray-900 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">
                        </div>
                        <div class="flex-1">
                            <label for="leave-end-time-input" class="block text-xs font-bold text-gray-500 mb-1">종료 시간</label>
                            <input type="time" id="leave-end-time-input" class="w-full bg-gray-50 border border-gray-200 text-gray-900 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">

                    </div>
                    <div class="text-xs text-gray-500 text-center">* 오늘 날짜 기준으로 시간이 적용됩니다.</div>
                </div>

            </div>
        </div>

        <div class="p-4 bg-gray-50 border-t border-gray-200 flex justify-end gap-3">
            <button type="button" id="cancel-leave-btn" class="modal-close-btn static bg-white hover:bg-gray-100 border border-gray-300 text-gray-800 font-bold py-2.5 px-4 rounded-xl transition text-sm shadow-sm" data-modal-id="leave-type-modal">닫기</button>

        </div>
    </div>
</div>
