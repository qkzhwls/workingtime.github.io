<div id="edit-record-modal" class="fixed inset-0 bg-gray-900 bg-opacity-75 flex items-center justify-center hidden z-50 p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg relative flex flex-col max-h-[90vh]">
        <div class="p-6 border-b border-gray-200 flex justify-between items-center flex-shrink-0">
            <h2 class="text-xl font-bold text-gray-900">업무 기록 수정</h2>
            <button class="modal-close-btn">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
        </div>
        <div class="p-6 space-y-4 overflow-y-auto flex-grow">
            <div>
                <label for="edit-member-name" class="block text-sm font-medium text-gray-700">이름</label>
                <input type="text" id="edit-member-name" class="mt-1 w-full bg-gray-50 border border-gray-300 rounded-lg p-2" readonly>
            </div>
            <div>
                <label for="edit-task-type" class="block text-sm font-medium text-gray-700">업무</label>
                <select id="edit-task-type" class="mt-1 w-full bg-white border border-gray-300 rounded-lg p-2"></select>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="edit-start-time" class="block text-sm font-medium text-gray-700">시작 시간</label>
                    <input type="time" id="edit-start-time" class="mt-1 w-full bg-white border border-gray-300 rounded-lg p-2">
                </div>
                <div>
                    <label for="edit-end-time" class="block text-sm font-medium text-gray-700">종료 시간</label>
                    <input type="time" id="edit-end-time" class="mt-1 w-full bg-white border border-gray-300 rounded-lg p-2">
                </div>
            </div>

            <div class="border-t border-gray-200 pt-4 mt-2">
                <div class="flex justify-between items-center mb-2">
                    <label class="block text-sm font-bold text-gray-700">휴식(비업무) 시간 내역</label>
                    <span id="edit-total-pause-time" class="text-xs text-gray-500 font-mono bg-gray-100 px-2 py-0.5 rounded">총 0분</span>
                </div>
                
                <div id="edit-pause-list" class="space-y-2 mb-3 max-h-40 overflow-y-auto bg-gray-50 p-3 rounded-lg border border-gray-200 text-sm min-h-[80px]">
                    <div class="text-center text-gray-400 py-4 text-xs">기록된 휴식 시간이 없습니다.</div>
                </div>

                <div class="bg-blue-50 p-3 rounded-lg border border-blue-100">
                    <label class="block text-xs font-bold text-blue-800 mb-2">휴식 시간 추가</label>
                    <div class="flex items-end gap-2">
                        <div class="flex-1">
                            <label class="text-[10px] text-gray-500 block mb-0.5">시작</label>
                            <input type="time" id="edit-pause-add-start" class="w-full p-1.5 border border-blue-200 rounded text-sm focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div class="flex-1">
                            <label class="text-[10px] text-gray-500 block mb-0.5">종료</label>
                            <input type="time" id="edit-pause-add-end" class="w-full p-1.5 border border-blue-200 rounded text-sm focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <button type="button" id="edit-pause-add-btn" class="bg-blue-600 text-white px-3 py-1.5 rounded-md text-xs font-bold hover:bg-blue-700 transition h-[34px] shadow-sm">
                            추가
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <div class="p-4 bg-gray-50 rounded-b-2xl flex justify-end gap-3 flex-shrink-0 border-t border-gray-200">
            <button type="button" id="cancel-edit-btn" class="bg-white hover:bg-gray-100 border border-gray-300 text-gray-800 font-bold py-2 px-4 rounded-lg transition">취소</button>
            <button type="button" id="confirm-edit-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition shadow-md">저장</button>
        </div>
    </div>
</div>

<div id="task-select-modal" class="fixed inset-0 bg-gray-900 bg-opacity-75 flex items-center justify-center hidden z-50 p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-7xl relative">
        <div class="p-6 border-b border-gray-200 flex justify-between items-center">
            <h2 class="text-xl font-bold text-gray-900">업무 종류 선택</h2>
            <button class="modal-close-btn">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
        </div>
        <div id="task-modal-content" class="p-6 max-h-[70vh] overflow-y-auto flex flex-col md:flex-row gap-6"></div>
    </div>
</div>

<div id="manual-add-record-modal" class="fixed inset-0 bg-gray-900 bg-opacity-75 flex items-center justify-center hidden z-50 p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg relative">
        <div class="p-6 border-b border-gray-200 flex justify-between items-center">
            <h2 class="text-xl font-bold text-gray-900">수동 업무 기록 추가</h2>
            <button class="modal-close-btn" data-modal-id="manual-add-record-modal">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
        </div>
        <form id="manual-add-form">
            <div class="p-6 space-y-4">
                <div>
                    <label for="manual-add-member" class="block text-sm font-medium text-gray-700">이름 (선택 또는 입력)</label>
                    <input type="text" id="manual-add-member" list="manual-add-member-list" class="mt-1 w-full bg-white border border-gray-300 rounded-lg p-2" autocomplete="off" placeholder="이름 검색 또는 입력...">
                    <datalist id="manual-add-member-list"></datalist>
                </div>
                <div>
                    <label for="manual-add-task" class="block text-sm font-medium text-gray-700">업무 (선택 또는 입력)</label>
                    <input type="text" id="manual-add-task" list="manual-add-task-list" class="mt-1 w-full bg-white border border-gray-300 rounded-lg p-2" autocomplete="off" placeholder="업무 검색 또는 입력...">
                    <datalist id="manual-add-task-list"></datalist>
                </div>
                <div>
                    <label for="manual-add-start-time" class="block text-sm font-medium text-gray-700">시작 시간 (HH:MM)</label>
                    <input type="time" id="manual-add-start-time" class="mt-1 w-full bg-white border border-gray-300 rounded-lg p-2">
                </div>
                <div>
                    <label for="manual-add-end-time" class="block text-sm font-medium text-gray-700">종료 시간 (HH:MM)</label>
                    <input type="time" id="manual-add-end-time" class="mt-1 w-full bg-white border border-gray-300 rounded-lg p-2">
                </div>
            </div>
        </form>
        <div class="p-4 bg-gray-50 rounded-b-2xl flex justify-end gap-4">
            <button type="button" id="cancel-manual-add-btn" class="bg-white hover:bg-gray-100 border border-gray-300 text-gray-800 font-bold py-2 px-4 rounded-lg transition">취소</button>
            <button type="button" id="confirm-manual-add-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition">저장</button>
        </div>
    </div>
</div>

<div id="edit-start-time-modal" class="fixed inset-0 bg-gray-900 bg-opacity-75 flex items-center justify-center hidden z-[101] p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm relative">
        <div class="p-6 border-b border-gray-200 flex justify-between items-center">
            <h2 id="edit-start-time-modal-title" class="text-xl font-bold text-gray-900">시작 시간 변경</h2>
            <button class="modal-close-btn" data-modal-id="edit-start-time-modal">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
        </div>
        <div class="p-6 space-y-4">
            <p id="edit-start-time-modal-message" class="text-sm text-gray-600"></p>
            <div>
                <label for="edit-start-time-input" class="block text-sm font-medium text-gray-700">새 시작 시간 (HH:MM)</label>
                <input type="time" id="edit-start-time-input" class="mt-1 w-full bg-white border border-gray-300 rounded-lg p-2">
                <input type="hidden" id="edit-start-time-context-id">
                <input type="hidden" id="edit-start-time-context-type"> 
            </div>
        </div>
        <div class="p-4 bg-gray-50 rounded-b-2xl flex justify-end gap-4">
            <button type="button" id="cancel-edit-start-time-btn" class="bg-white hover:bg-gray-100 border border-gray-300 text-gray-800 font-bold py-2 px-4 rounded-lg transition">취소</button>
            <button type="button" id="confirm-edit-start-time-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition">저장</button>
        </div>
    </div>
</div>
