<style>
    /* Ver 1.8 날짜 버튼 스타일 전용 (기존 CSS 하단에 추가) */
    .date-buttons-container { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; min-height: 38px; }
    .date-chip-btn { 
        padding: 5px 12px; border: 1px solid #ccc; background: #fff; border-radius: 4px; cursor: pointer; 
        font-size: 12px; font-weight: bold; color: #333; transition: 0.2s; white-space: nowrap;
    }

    .date-actions { display: flex; gap: 5px; margin-left: auto; border-left: 1px solid #eee; padding-left: 15px; }

    <label style="font-size: 13px; font-weight: bold; color: #555; white-space: nowrap;">📅 출고일 선택:</label>

        <span style="color:#888; font-size:12px;">오더리스트를 먼저 동기화하세요.</span>
    </div>
    <div class="date-actions">
        <button class="btn-date-apply" id="btn-date-apply">적용</button>
        <button class="btn-date-clear" id="btn-date-clear">초기화</button>
    </div>
</div>
