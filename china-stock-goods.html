<style>
    /* Ver 1.8 버튼 스타일 추가 */
    .date-bar { margin: 0 20px 10px 20px; background: white; border: 1px solid #ddd; border-radius: 10px; padding: 12px 15px; display: flex; flex-direction: column; gap: 12px; }
    .date-select-wrapper { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .date-list-container { display: flex; gap: 8px; flex-wrap: wrap; flex: 1; min-height: 40px; align-items: center; }
    
    .date-toggle-btn { 
        padding: 6px 12px; border: 1px solid #ddd; background: #fdfdfd; border-radius: 6px; cursor: pointer; 
        font-size: 13px; font-weight: bold; line-height: 1.3; text-align: center; transition: 0.2s;
    }
    .date-toggle-btn small { display: block; font-size: 10px; color: #888; font-weight: normal; margin-top: 2px; }
    .date-toggle-btn:hover { background: #fff3e0; border-color: var(--primary); }
    .date-toggle-btn.selected { background: var(--primary); color: white; border-color: var(--primary); }
    .date-toggle-btn.selected small { color: #ffe0b2; }

    .date-actions { display: flex; gap: 8px; border-left: 1px solid #eee; padding-left: 15px; }
</style>

<div class="date-bar">
    <div class="date-select-wrapper">
        <label style="font-size: 13px; font-weight: bold; color: #555; white-space: nowrap;">📅 출고일 선택:</label>
        <div class="date-list-container" id="date-list-container">
            <span style="color:#888; font-size:13px;">데이터 로드 중...</span>
        </div>
        <div class="date-actions">
            <button class="btn-date-apply" id="btn-date-apply">적용</button>
            <button class="btn-date-clear" id="btn-date-clear">초기화</button>
        </div>
    </div>
</div>
