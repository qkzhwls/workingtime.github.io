<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>입고 스캐너</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Noto Sans KR', sans-serif; background: #f4f6f8; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }

        .tabs { display: flex; gap: 8px; padding: 10px 12px 6px; background: var(--theme, #1976d2); align-items: center; }
        .tab { flex: 1; text-align: center; padding: 10px 0; border-radius: 20px; color: #fff; font-weight: 800; font-size: 16px; cursor: pointer; }
        .tab.active { background: #fff; color: #222; }
        .btn-gear { background: none; border: none; font-size: 22px; color: #fff; cursor: pointer; padding: 4px 6px; }
        .status-line { background: rgba(0,0,0,0.25); color: #fff; text-align: center; font-size: 12px; font-weight: bold; padding: 4px 0; }

        /* [Ver 3.7] 카메라가 남은 화면 전체를 채움 (스캔 목록은 카메라 위에 오버레이) */
        .scan-wrap { position: relative; background: #000; flex: 1; min-height: 0; overflow: hidden; }
        #reader { width: 100%; height: 100%; }
        #reader video { width: 100% !important; height: 100% !important; object-fit: cover; }
        .btn-start { position: absolute; inset: 0; margin: auto; width: 220px; height: 64px; background: #1976d2; color: #fff; border: none; border-radius: 12px; font-size: 19px; font-weight: 800; cursor: pointer; z-index: 5; }
        .cam-controls { display: none; position: absolute; right: 8px; top: 8px; z-index: 8; gap: 6px; align-items: center; background: rgba(0,0,0,0.45); border-radius: 24px; padding: 5px 10px; }
        .cam-controls button { background: none; border: none; font-size: 22px; color: #fff; cursor: pointer; padding: 2px 6px; opacity: 0.85; }
        .cam-controls #zoom-label { color: #fff; font-size: 13px; font-weight: bold; min-width: 36px; text-align: center; }

        .loc-banner { padding: 12px 15px; font-size: 17px; font-weight: 800; background: #fff3e0; color: #6d4c41; display: none; }
        .loc-banner.fixed { background: #e8f5e9; color: #1b5e20; }

        /* [Ver 3.7] 스캔 목록: 카메라 위 반투명 오버레이 (내역 있을 때만 표시) */
        .queue { display: none; position: absolute; left: 0; right: 0; bottom: calc(80px + env(safe-area-inset-bottom)); max-height: 45%; overflow-y: auto; padding: 6px 8px; z-index: 7; }
        .qitem { background: rgba(255,255,255,0.93); border: 1px solid #e0e0e0; border-radius: 10px; padding: 8px 12px; margin-bottom: 6px; display: flex; align-items: center; gap: 10px; }
        .qinfo { flex: 1; min-width: 0; }
        .qcode { font-size: 18px; font-weight: 800; }
        .qsub { font-size: 12px; color: #777; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .qqty { font-size: 17px; font-weight: 800; color: #1976d2; white-space: nowrap; }
        .qdel { background: none; border: none; font-size: 20px; color: #d32f2f; cursor: pointer; padding: 4px; }
        .empty-msg { text-align: center; color: #999; padding: 40px 0; font-size: 14px; }

        .send-bar { position: fixed; bottom: 0; left: 0; width: 100%; padding: 10px 12px calc(10px + env(safe-area-inset-bottom)); background: #f4f6f8; border-top: 1px solid #ddd; }
        .btn-send { width: 100%; height: 58px; border: none; border-radius: 12px; background: var(--theme, #1976d2); color: #fff; font-size: 19px; font-weight: 800; cursor: pointer; }
        .btn-send:disabled { background: #b0bec5; }

        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 100; justify-content: center; align-items: center; padding: 18px; }
        .modal { background: #fff; border-radius: 14px; padding: 20px; width: 100%; max-width: 360px; max-height: 85dvh; overflow-y: auto; }
        .m-code { font-size: 26px; font-weight: 900; color: #1976d2; text-align: center; word-break: break-all; }
        .m-loc { font-size: 21px; font-weight: 800; text-align: center; margin-top: 4px; }
        .m-remain { text-align: center; margin: 8px 0; font-size: 15px; }
        .m-remain b { font-size: 34px; color: #d32f2f; }
        .m-btn { width: 100%; height: 58px; margin-top: 8px; border: none; border-radius: 10px; background: #1976d2; color: #fff; font-size: 20px; font-weight: 800; cursor: pointer; }
        .m-btn.outline { background: #fff; color: #1976d2; border: 2px solid #1976d2; }
        .m-btn.gray { background: #eee; color: #555; font-size: 16px; height: 46px; }
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 10px; }
        .numpad button { height: 52px; font-size: 20px; font-weight: 800; border: 1px solid #ddd; border-radius: 8px; background: #fafafa; cursor: pointer; }
        .num-display { border: 2px solid #1976d2; border-radius: 8px; padding: 10px; font-size: 30px; font-weight: 900; text-align: right; }
        .set-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; font-size: 14px; font-weight: bold; gap: 8px; }
        .set-row input[type="text"] { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 12px; }
        .set-row input[type="checkbox"] { width: 22px; height: 22px; }

        #toast { visibility: hidden; position: fixed; bottom: 95px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 14px; z-index: 200; opacity: 0; transition: 0.3s; max-width: 90%; text-align: center; }
        #toast.show { visibility: visible; opacity: 1; }
        #update-banner { display: none; position: fixed; top: 0; left: 0; width: 100%; background: #e65100; color: #fff; z-index: 300; padding: 12px; text-align: center; font-weight: bold; }
        #update-banner button { margin-left: 10px; padding: 6px 14px; border: none; border-radius: 6px; background: #fff; color: #e65100; font-weight: bold; }
    </style>
</head>
<body>
    <div id="update-banner"></div>

    <div class="tabs" id="tabs">
        <div class="tab active" id="tab-in">📦 입고</div>
        <div class="tab" id="tab-loc">📍 위치</div>
        <button class="btn-gear" id="btn-settings">⚙️</button>
    </div>
    <div class="status-line" id="status-line">-</div>

    <div class="loc-banner" id="loc-banner">위치를 먼저 스캔하세요</div>

    <div class="scan-wrap">
        <div id="reader"></div>
        <button class="btn-start" id="btn-start">📷 스캔 시작</button>
        <div class="cam-controls" id="cam-controls">
            <button id="btn-torch">🔦</button>
            <button id="btn-zoom-out">➖</button>
            <span id="zoom-label">1.0x</span>
            <button id="btn-zoom-in">➕</button>
        </div>
        <div class="queue" id="queue"></div>
    </div>

    <div class="send-bar"><button class="btn-send" id="btn-send" disabled>전송하기 (0)</button></div>

    <!-- 입고 선택 모달 -->
    <div class="overlay" id="ov-select"><div class="modal">
        <div class="m-code" id="sel-code"></div>
        <div class="m-loc" id="sel-loc"></div>
        <div class="m-remain">미발수량: <b id="sel-remain">0</b></div>
        <button class="m-btn" id="sel-qty-btn"></button>
        <button class="m-btn outline" id="sel-manual">직접 입력</button>
        <button class="m-btn gray" id="sel-cancel">취소</button>
    </div></div>

    <!-- 수량 입력 모달 -->
    <div class="overlay" id="ov-num"><div class="modal">
        <div style="font-weight:800; margin-bottom:8px;" id="num-title"></div>
        <div class="num-display" id="num-display">0</div>
        <div class="numpad" id="numpad"></div>
        <button class="m-btn" id="num-ok">확인</button>
        <button class="m-btn gray" id="num-cancel">취소</button>
    </div></div>

    <!-- 알림 모달 -->
    <div class="overlay" id="ov-alert"><div class="modal">
        <div style="font-weight:900; color:#d32f2f; font-size:17px;">알림</div>
        <div id="alert-msg" style="margin:12px 0; font-size:15px; white-space:pre-line;"></div>
        <button class="m-btn" id="alert-ok">확인</button>
    </div></div>

    <!-- 설정 모달 -->
    <div class="overlay" id="ov-set"><div class="modal">
        <div style="font-weight:900; font-size:17px; margin-bottom:6px;">⚙️ 설정</div>
        <div class="set-row"><span>스캔 즉시 수량 입력</span><input type="checkbox" id="set-direct"></div>
        <div class="set-row" style="flex-direction:column; align-items:stretch;"><span>구글 스크립트 URL (위치 전송용)</span><input type="text" id="set-gs" placeholder="https://script.google.com/..."></div>
        <div class="set-row"><span id="set-server">서버: -</span><button class="m-btn gray" style="width:auto; padding:0 14px; margin:0;" id="set-server-reset">기본값</button></div>
        <button class="m-btn" id="set-close">저장 후 닫기</button>
    </div></div>

    <div id="toast"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <script src="js/location-map.js?v=3.8"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, writeBatch, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { firebaseConfig } from './js/config.js';

        const SCAN_VERSION = '3.8'; // 웹 배포 버전과 함께 올림 (version.json의 web)

        // ---------------- 서버 선택 (URL 파라미터 → 저장값 → 기본 config) ----------------
        const params = new URLSearchParams(location.search);
        let serverCfg = null;
        try { serverCfg = JSON.parse(localStorage.getItem('scanServerCfg') || 'null'); } catch (e) {}
        if (params.get('projectId') && params.get('apiKey')) {
            serverCfg = {
                label: params.get('label') || params.get('projectId'),
                projectId: params.get('projectId'), apiKey: params.get('apiKey'),
                appId: params.get('appId') || '', messagingSenderId: params.get('messagingSenderId') || ''
            };
            localStorage.setItem('scanServerCfg', JSON.stringify(serverCfg));
            history.replaceState(null, '', location.pathname);
        }
        const activeCfg = serverCfg
            ? { apiKey: serverCfg.apiKey, projectId: serverCfg.projectId, appId: serverCfg.appId || undefined, messagingSenderId: serverCfg.messagingSenderId || undefined }
            : firebaseConfig;
        const serverLabel = serverCfg ? (serverCfg.label || serverCfg.projectId) : (firebaseConfig.projectId + ' (기본)');
        const app = initializeApp(activeCfg, 'scanApp');
        const db = getFirestore(app);

        // ---------------- 상태 ----------------
        let mode = localStorage.getItem('scanMode') || 'in';
        let inboundQueue = JSON.parse(localStorage.getItem('scanInQueue') || '[]');
        let locationQueue = JSON.parse(localStorage.getItem('scanLocQueue') || '[]');
        let fixedLocation = null;
        let directQty = localStorage.getItem('scanDirectQty') === '1';
        let gsUrl = localStorage.getItem('scanGsUrl') || '';
        let scanner = null, scanning = false, processing = false, sending = false;

        const $ = (id) => document.getElementById(id);
        const saveQueues = () => { localStorage.setItem('scanInQueue', JSON.stringify(inboundQueue)); localStorage.setItem('scanLocQueue', JSON.stringify(locationQueue)); };

        function speak(t) { try { const u = new SpeechSynthesisUtterance(t); u.lang = 'ko-KR'; u.rate = 1.1; speechSynthesis.cancel(); speechSynthesis.speak(u); } catch (e) {} }
        function toast(msg) { const t = $('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2200); }

        // ---------------- 스캐너 ----------------
        async function startScan() {
            if (scanning) return;
            try {
                const formats = [Html5QrcodeSupportedFormats.QR_CODE, Html5QrcodeSupportedFormats.CODE_128, Html5QrcodeSupportedFormats.EAN_13];
                scanner = new Html5Qrcode('reader', {
                    formatsToSupport: formats,
                    verbose: false,
                    // [Ver 3.5] 지원 기기(안드로이드 크롬 등)에서 하드웨어 가속 바코드 감지기 사용 → 네이티브급 인식
                    experimentalFeatures: { useBarCodeDetectorIfSupported: true }
                });
                await scanner.start(
                    { facingMode: 'environment' },
                    {
                        fps: 15,
                        // [Ver 3.8] qrbox 제거 → 카메라 화면 전체가 인식 영역 (구역 조준 불필요)
                        disableFlip: true, // 후면 카메라라 반전 스캔 불필요 (속도 향상)
                        // [Ver 3.5] 고해상도 요청 (작은 바코드 인식률 향상)
                        videoConstraints: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
                    },
                    onScan, () => {});
                scanning = true;
                $('btn-start').style.display = 'none';
                speak(''); // iOS 음성 잠금 해제
                setupCamControls(); // [Ver 3.5] 초점/손전등/줌
            } catch (e) { showAlert('카메라를 시작할 수 없습니다.\n(카메라 권한을 허용해주세요)\n' + e); }
        }

        // [Ver 3.5] 카메라 제어: 연속 자동초점 + 손전등/줌 버튼 (지원 기기에서만 표시)
        let camTrack = null, torchOn = false, hasTorch = false, zoomCaps = null, zoomLevel = 1;
        async function setupCamControls() {
            try {
                const video = document.querySelector('#reader video');
                camTrack = (video && video.srcObject) ? video.srcObject.getVideoTracks()[0] : null;
                if (!camTrack || !camTrack.getCapabilities) return;
                const caps = camTrack.getCapabilities();
                if (caps.focusMode && caps.focusMode.includes('continuous')) {
                    try { await camTrack.applyConstraints({ advanced: [{ focusMode: 'continuous' }] }); } catch (e) {}
                }
                hasTorch = !!caps.torch;
                zoomCaps = caps.zoom || null;
                if (zoomCaps) zoomLevel = Math.max(1, zoomCaps.min || 1);
                $('btn-torch').style.display = hasTorch ? '' : 'none';
                $('btn-zoom-out').style.display = $('btn-zoom-in').style.display = $('zoom-label').style.display = zoomCaps ? '' : 'none';
                if (hasTorch || zoomCaps) $('cam-controls').style.display = 'flex';
            } catch (e) {}
        }
        async function applyCam() {
            if (!camTrack) return;
            const adv = [];
            if (zoomCaps) adv.push({ zoom: zoomLevel });
            if (hasTorch) adv.push({ torch: torchOn });
            if (adv.length) { try { await camTrack.applyConstraints({ advanced: adv }); } catch (e) {} }
        }
        function pauseScan() { try { scanner.pause(true); } catch (e) {} }
        function resumeScan(delay = 700) { setTimeout(() => { try { scanner.resume(); } catch (e) {} processing = false; }, delay); }

        async function onScan(text) {
            if (processing) return;
            processing = true; pauseScan();
            const raw = text.trim();

            // 서버 연결 QR (웹 [서버 연결 QR 출력]과 동일 형식)
            if (raw.startsWith('{') && raw.includes('fb-server')) {
                try { const c = JSON.parse(raw);
                    if (c && c.type === 'fb-server') {
                        localStorage.setItem('scanServerCfg', JSON.stringify(c));
                        speak('서버 연결됨');
                        alert('서버 연결: ' + (c.label || c.projectId) + '\n페이지를 다시 불러옵니다.');
                        location.reload(); return;
                    }
                } catch (e) {}
            }
            // 구글 스크립트 설정 QR
            if (raw.includes('script.google.com')) {
                gsUrl = raw; localStorage.setItem('scanGsUrl', raw);
                speak('구글 주소 변경'); toast('구글 스크립트 주소 저장됨'); resumeScan(); return;
            }
            if (mode === 'in') await processInbound(raw); else processLocation(raw);
        }

        // ---------------- 입고 모드 ----------------
        async function processInbound(code) {
            let key = code.toUpperCase();
            if (/^[0-9]+$/.test(key)) key = 'S' + key;
            let snap;
            try { snap = await getDoc(doc(db, 'ChinaStockGoods_ScanDB', key)); }
            catch (e) { showAlert('DB 조회 오류\n(네트워크 확인)'); return; }
            if (!snap.exists()) { showAlert('등록되지 않은 상품입니다.\n(' + key + ')'); return; }
            const d = snap.data();
            const item = { code: key, name: d.name || '', location: d.location || '미지정', arrivalQty: parseInt(d.arrivalQty) || 0, mibalQty: parseInt(d.mibalQty) || 0 };
            if (directQty) showNumpad(item); else showSelect(item);
        }

        let currentItem = null;
        function showSelect(item) {
            currentItem = item;
            $('sel-code').textContent = item.code;
            $('sel-loc').textContent = item.location;
            $('sel-remain').textContent = item.mibalQty;
            $('sel-qty-btn').textContent = item.arrivalQty + '개';
            $('ov-select').style.display = 'flex';
        }
        function closeSelect() { $('ov-select').style.display = 'none'; }

        function addInbound(item, qty, dest) {
            inboundQueue.unshift({ barcode: item.code, qty, name: item.name, location: item.location, dest, time: new Date().toTimeString().slice(0, 8) });
            saveQueues(); renderQueue(); speak(qty + '개');
        }

        // 수량 넘패드
        let numInput = '';
        function showNumpad(item) {
            currentItem = item; numInput = '';
            $('num-title').textContent = item.code + ' 수량 입력';
            $('num-display').textContent = '0';
            $('ov-num').style.display = 'flex';
        }
        function buildNumpad() {
            const pad = $('numpad');
            const keys = ['1','2','3','4','5','6','7','8','9','C','0','⌫'];
            keys.forEach(k => {
                const b = document.createElement('button');
                b.textContent = k;
                b.onclick = () => {
                    if (k === 'C') numInput = '';
                    else if (k === '⌫') numInput = numInput.slice(0, -1);
                    else if (numInput.length < 5) numInput += k;
                    $('num-display').textContent = numInput || '0';
                };
                pad.appendChild(b);
            });
        }

        // ---------------- 위치 모드 ----------------
        function processLocation(code) {
            const key = code.toUpperCase();
            if (barcodeMap[key]) {
                fixedLocation = barcodeMap[key];
                renderLocBanner(); speak('위치 변경'); resumeScan(); return;
            }
            if (!fixedLocation) { speak('위치를 먼저 찍으세요'); toast('위치 바코드를 먼저 스캔하세요'); resumeScan(); return; }
            if (!/^S\d{6}$/.test(key)) { showAlert('형식 오류\n(올바른 상품 바코드가 아닙니다)'); return; }
            locationQueue.unshift({ barcode: key, location: fixedLocation, time: new Date().toTimeString().slice(0, 8) });
            saveQueues(); renderQueue(); speak('스캔'); resumeScan();
        }

        // ---------------- 전송 ----------------
        async function sendInbound() {
            if (!inboundQueue.length || sending) return;
            sending = true; updateSendBtn('전송 중...');
            try {
                const CHUNK = 200; // 배치당 400 작업 (한도 500 이내)
                for (let i = 0; i < inboundQueue.length; i += CHUNK) {
                    const batch = writeBatch(db);
                    inboundQueue.slice(i, i + CHUNK).forEach(it => {
                        batch.update(doc(db, 'ChinaStockGoods_ScanDB', it.barcode), { arrivalQty: increment(-it.qty) });
                        batch.set(doc(collection(db, 'ChinaStockGoods_InboundHistory')), {
                            barcode: it.barcode, qty: it.qty, name: it.name, location: it.location,
                            dest: it.dest, timestamp: serverTimestamp(), worker: 'Scanner_Web'
                        });
                    });
                    await batch.commit();
                }
                inboundQueue = []; saveQueues(); renderQueue();
                speak('전송 완료'); toast('✅ 입고 처리 완료');
            } catch (e) { showAlert('전송 실패\n(권한 또는 네트워크 오류)'); }
            sending = false; updateSendBtn();
        }

        async function sendLocation() {
            if (!locationQueue.length || sending) return;
            if (!gsUrl) { showAlert('구글 스크립트 URL이 설정되지 않았습니다.\n(설정에서 입력하거나 설정 QR을 스캔하세요)'); return; }
            sending = true; updateSendBtn('전송 중...');
            const payload = locationQueue.map(it => ({ barcode: it.barcode, location: it.location }));
            try {
                let ok = false;
                try {
                    const res = await fetch(gsUrl, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ data: payload }) });
                    ok = res.ok;
                } catch (corsErr) {
                    // CORS로 응답을 못 읽는 경우: no-cors로 재전송 (전송은 되지만 응답 확인 불가)
                    await fetch(gsUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ data: payload }) });
                    ok = true;
                }
                if (ok) { locationQueue = []; fixedLocation = null; saveQueues(); renderQueue(); renderLocBanner(); speak('전송 완료'); toast('✅ 위치 전송 완료'); }
                else showAlert('전송 실패 (서버 응답 오류)');
            } catch (e) { showAlert('네트워크 오류'); }
            sending = false; updateSendBtn();
        }

        // ---------------- 렌더링 ----------------
        function currentQueue() { return mode === 'in' ? inboundQueue : locationQueue; }

        function renderQueue() {
            const q = currentQueue(); const el = $('queue');
            if (!q.length) { el.style.display = 'none'; el.innerHTML = ''; updateSendBtn(); return; }
            el.style.display = 'block';
            el.innerHTML = q.map((it, i) => `
                <div class="qitem">
                    <div class="qinfo">
                        <div class="qcode">${it.barcode}</div>
                        <div class="qsub">${it.name ? it.name + ' - ' : ''}${it.location} · ${it.time}</div>
                    </div>
                    ${mode === 'in' ? `<div class="qqty">${it.qty}개</div>` : ''}
                    <button class="qdel" data-i="${i}">🗑</button>
                </div>`).join('');
            el.querySelectorAll('.qdel').forEach(b => b.onclick = () => {
                currentQueue().splice(parseInt(b.dataset.i), 1); saveQueues(); renderQueue();
            });
            updateSendBtn();
        }

        function updateSendBtn(text) {
            const btn = $('btn-send');
            btn.textContent = text || `전송하기 (${currentQueue().length})`;
            btn.disabled = sending || currentQueue().length === 0;
        }

        function renderLocBanner() {
            const b = $('loc-banner');
            b.style.display = mode === 'loc' ? 'block' : 'none';
            if (fixedLocation) { b.textContent = '작업 위치: ' + fixedLocation; b.classList.add('fixed'); }
            else { b.textContent = '위치를 먼저 스캔하세요'; b.classList.remove('fixed'); }
        }

        function setMode(m) {
            mode = m; localStorage.setItem('scanMode', m);
            $('tab-in').classList.toggle('active', m === 'in');
            $('tab-loc').classList.toggle('active', m === 'loc');
            const theme = m === 'in' ? '#1976d2' : '#2e7d32';
            document.querySelector('.tabs').style.background = theme;
            $('btn-send').style.background = '';
            document.body.style.setProperty('--theme', theme);
            renderLocBanner(); renderQueue();
        }

        function showAlert(msg) {
            speak('오류');
            $('alert-msg').textContent = msg;
            $('ov-alert').style.display = 'flex';
        }

        // ---------------- 버전 체크 ----------------
        async function checkVersion() {
            try {
                const res = await fetch(new URL('version.json', location.href).href, { cache: 'no-store' });
                const info = await res.json();
                if (info.web && info.web !== SCAN_VERSION) {
                    const b = $('update-banner');
                    if (b.style.display !== 'block') {
                        b.innerHTML = `🔄 새 버전(Ver ${info.web}) 배포됨 `;
                        const btn = document.createElement('button');
                        btn.textContent = '지금 새로고침'; btn.onclick = () => location.reload();
                        b.appendChild(btn); b.style.display = 'block';
                    }
                }
            } catch (e) {}
        }

        // ---------------- 이벤트 바인딩 ----------------
        $('btn-start').onclick = startScan;
        // [Ver 3.5] 손전등/줌
        $('btn-torch').onclick = () => { torchOn = !torchOn; $('btn-torch').style.opacity = torchOn ? '1' : '0.5'; applyCam(); };
        $('btn-zoom-in').onclick = () => {
            if (!zoomCaps) return;
            zoomLevel = Math.min((zoomCaps.max || 4), +(zoomLevel + (zoomCaps.step || 0.5)).toFixed(1));
            $('zoom-label').textContent = zoomLevel.toFixed(1) + 'x'; applyCam();
        };
        $('btn-zoom-out').onclick = () => {
            if (!zoomCaps) return;
            zoomLevel = Math.max((zoomCaps.min || 1), +(zoomLevel - (zoomCaps.step || 0.5)).toFixed(1));
            $('zoom-label').textContent = zoomLevel.toFixed(1) + 'x'; applyCam();
        };
        $('tab-in').onclick = () => setMode('in');
        $('tab-loc').onclick = () => setMode('loc');
        $('btn-send').onclick = () => mode === 'in' ? sendInbound() : sendLocation();

        $('sel-qty-btn').onclick = () => { closeSelect(); addInbound(currentItem, currentItem.arrivalQty, '도착예정분'); resumeScan(); };
        $('sel-manual').onclick = () => { closeSelect(); showNumpad(currentItem); };
        $('sel-cancel').onclick = () => { closeSelect(); resumeScan(); };

        $('num-ok').onclick = () => {
            const v = parseInt(numInput);
            if (v > 0) { $('ov-num').style.display = 'none'; addInbound(currentItem, v, '직접입력'); resumeScan(); }
        };
        $('num-cancel').onclick = () => { $('ov-num').style.display = 'none'; resumeScan(); };
        $('alert-ok').onclick = () => { $('ov-alert').style.display = 'none'; resumeScan(); };

        $('btn-settings').onclick = () => {
            $('set-direct').checked = directQty;
            $('set-gs').value = gsUrl;
            $('set-server').textContent = '서버: ' + serverLabel;
            $('ov-set').style.display = 'flex';
        };
        $('set-close').onclick = () => {
            directQty = $('set-direct').checked;
            gsUrl = $('set-gs').value.trim();
            localStorage.setItem('scanDirectQty', directQty ? '1' : '0');
            localStorage.setItem('scanGsUrl', gsUrl);
            $('ov-set').style.display = 'none'; toast('💾 설정 저장됨');
        };
        $('set-server-reset').onclick = () => {
            localStorage.removeItem('scanServerCfg');
            speak('기본 서버로 변경');
            location.reload();
        };

        // ---------------- 초기화 ----------------
        buildNumpad();
        $('status-line').textContent = `v${SCAN_VERSION} · 서버: ${serverLabel}`;
        setMode(mode);
        checkVersion();
        window.addEventListener('focus', checkVersion);
        setInterval(checkVersion, 10 * 60 * 1000);
    </script>
</body>
</html>
