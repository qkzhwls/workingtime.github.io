<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:,">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>업무 매뉴얼 - 물류팀 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', }
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        .tab-btn.active { border-bottom: 2px solid #3b82f6; color: #3b82f6; font-weight: 700; }
        .dark .tab-btn.active { border-bottom: 2px solid #60a5fa; color: #60a5fa; }
        
        /* 고급 에디터 커스텀 스타일 (다크모드 지원) */
        .ql-toolbar { background: white; border-radius: 0.5rem 0.5rem 0 0; border-color: #d1d5db !important; }
        .dark .ql-toolbar { background: #374151; border-color: #4b5563 !important; }
        .dark .ql-container { border-color: #4b5563 !important; color: white; }
        .dark .ql-stroke { stroke: #d1d5db; }
        .dark .ql-fill { fill: #d1d5db; }
        .dark .ql-picker { color: #d1d5db; }
        .dark .ql-picker-options { background-color: #374151; border-color: #4b5563; }
        .ql-container { border-radius: 0 0 0.5rem 0.5rem; background: white; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; }
        .dark .ql-container { background: #1f2937; }
        .ql-editor { min-height: 400px; line-height: 1.6; }
        .ql-editor img { max-width: 100%; border-radius: 0.5rem; border: 1px solid #e5e7eb; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); }
        .dark .ql-editor img { border-color: #374151; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200 overflow-hidden flex h-screen transition-colors duration-200">
    <div id="toast-container" class="fixed bottom-5 right-5 z-[200] space-y-2 w-full max-w-xs"></div>

    <aside class="w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 hidden md:flex flex-col z-20 shadow-sm shrink-0 transition-colors">
        <div class="p-6 border-b border-gray-100 dark:border-gray-700 flex items-center gap-2">
            <h1 class="text-xl font-bold text-gray-900 dark:text-white tracking-tight">📖 업무 매뉴얼</h1>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-1 overflow-y-auto">
            <button id="btn-show-add" class="w-full flex justify-center items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 rounded-lg font-bold transition shadow-sm mb-6">+ 새 매뉴얼 등록</button>
            <div class="text-[11px] font-bold text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-2 px-2">파트별 조회</div>
            <div id="manual-group-list" class="space-y-1">
                </div>
            
            <a href="index.html" class="w-full flex items-center gap-3 text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 px-4 py-3 rounded-xl font-medium transition mt-10">
                <span class="text-lg">⬅️</span> 메인으로 돌아가기
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden relative">
        <header class="h-16 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between px-4 md:px-8 shrink-0 transition-colors z-10">
            <div class="flex items-center gap-3">
                <a href="index.html" class="md:hidden p-2 -ml-2 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                </a>
                <h2 id="current-group-title" class="text-lg font-bold text-gray-800 dark:text-white">전체 매뉴얼</h2>
            </div>
            <div class="flex items-center gap-2">
                <input type="text" id="manual-search-input" placeholder="매뉴얼 검색..." class="text-sm px-3 py-1.5 border border-gray-300 dark:border-gray-600 rounded-lg bg-gray-50 dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 dark:text-white">
                <button id="btn-show-add-mobile" class="md:hidden bg-blue-600 text-white px-3 py-1.5 rounded-lg text-sm font-bold shadow-sm">+ 등록</button>
            </div>
        </header>

        <div id="view-mode-container" class="flex-1 overflow-y-auto p-4 md:p-8">
            <div id="manual-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                </div>
            <div id="empty-state" class="hidden flex flex-col items-center justify-center h-full text-gray-400">
                <span class="text-4xl mb-3">📄</span>
                <p>등록된 매뉴얼이 없습니다.</p>
            </div>
        </div>

        <div id="edit-mode-container" class="hidden flex-1 overflow-y-auto p-4 md:p-8 bg-gray-50 dark:bg-gray-900">
            <div class="max-w-4xl mx-auto bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 p-6 md:p-8">
                <div class="flex justify-between items-center mb-6 border-b border-gray-100 dark:border-gray-700 pb-4">
                    <h2 id="edit-mode-title" class="text-xl font-bold text-gray-800 dark:text-white">새 매뉴얼 등록</h2>
                    <button id="btn-cancel-edit" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 text-xl font-bold">&times;</button>
                </div>

                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1.5">제목</label>
                        <input type="text" id="manual-title" class="w-full p-2.5 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:outline-none focus:border-blue-500 dark:text-white" placeholder="예: 직진배송 송장 출력 방법">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1.5">파트 (그룹)</label>
                            <select id="manual-group" class="w-full p-2.5 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:outline-none focus:border-blue-500 dark:text-white">
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1.5">관련 업무 (선택)</label>
                            <select id="manual-task" class="w-full p-2.5 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:outline-none focus:border-blue-500 dark:text-white">
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1.5">작성 방식</label>
                        <div class="flex gap-4">
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="radio" name="manual-type" value="text" checked class="text-blue-600 focus:ring-blue-500 h-4 w-4">
                                <span class="text-sm dark:text-gray-300">직접 작성 (에디터/이미지 첨부)</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="radio" name="manual-type" value="file" class="text-blue-600 focus:ring-blue-500 h-4 w-4">
                                <span class="text-sm dark:text-gray-300">파일 통째로 업로드 (PDF/엑셀)</span>
                            </label>
                        </div>
                    </div>

                    <div id="type-text-container">
                        <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1.5">상세 내용</label>
                        <div id="manual-content-editor"></div>
                    </div>

                    <div id="type-file-container" class="hidden">
                        <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1.5">파일 업로드</label>
                        <div class="border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-xl p-8 text-center bg-gray-50 dark:bg-gray-800/50 hover:bg-gray-100 dark:hover:bg-gray-700/50 transition relative">
                            <input type="file" id="manual-file-input" accept=".pdf, .png, .jpg, .jpeg, .xlsx, .xls" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                            <div class="text-4xl mb-2">📁</div>
                            <p class="text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">여기를 클릭하거나 파일을 드래그하여 업로드하세요.</p>
                            <p class="text-xs text-gray-500">지원 형식: PDF, 엑셀(XLSX)</p>
                            <div id="file-name-display" class="mt-4 text-sm font-bold text-blue-600 hidden"></div>
                        </div>
                    </div>

                    <div class="flex justify-end pt-4">
                        <button id="btn-save-manual" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-8 rounded-lg transition shadow-sm">저장하기</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="manual-detail-modal" class="fixed inset-0 bg-gray-900/80 backdrop-blur-sm hidden z-[100] flex items-center justify-center p-2 md:p-6 transition-opacity">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full max-w-5xl h-full max-h-[90vh] flex flex-col relative overflow-hidden">
            <div class="flex justify-between items-center p-4 md:p-5 border-b border-gray-200 dark:border-gray-700 shrink-0 bg-gray-50 dark:bg-gray-800/80">
                <div>
                    <h2 id="detail-title" class="text-xl md:text-2xl font-bold text-gray-900 dark:text-white leading-tight">매뉴얼 제목</h2>
                    <div class="flex gap-2 mt-2">
                        <span id="detail-group" class="text-xs bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded-full font-bold">파트명</span>
                        <span id="detail-task" class="text-xs bg-gray-200 text-gray-700 dark:bg-gray-700 dark:text-gray-300 px-2 py-0.5 rounded-full font-bold">관련업무</span>
                    </div>
                </div>
                <div class="flex items-center gap-2 md:gap-4 shrink-0">
                    <button id="btn-edit-manual" class="text-sm bg-blue-50 text-blue-600 hover:bg-blue-100 font-bold px-3 py-1.5 rounded transition">수정</button>
                    <button id="btn-delete-manual" class="text-sm bg-red-50 text-red-600 hover:bg-red-100 font-bold px-3 py-1.5 rounded transition">삭제</button>
                    <div class="w-px h-6 bg-gray-300 dark:bg-gray-600 mx-1"></div>
                    <button id="btn-close-detail" class="text-gray-400 hover:text-gray-700 dark:hover:text-white text-3xl leading-none">&times;</button>
                </div>
            </div>
            
            <div id="detail-content-area" class="flex-1 overflow-y-auto p-4 md:p-8 bg-gray-100 dark:bg-gray-900">
                </div>
        </div>
    </div>

    <script type="module" src="js/manual.js"></script>
</body>
</html>
